# Single-origin SPA + API proxy.
#
# The dashboard fetches relative paths (VITE_API_URL=""), so this server
# routes known backend prefixes to the mcp service and falls through to
# the SPA's index.html for client-side routes.

upstream mcp_backend {
    server mcp:8000;
}

server {
    listen 80 default_server;
    server_name _;

    # Don't gzip JSON by default; uvicorn streams. Enable for static.
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # ------------------------------------------------------------------
    # Backend prefixes — proxy to the mcp service.
    # Listed explicitly so SPA navigation never accidentally hits backend.
    # Keep in sync with src/api routers + main.py top-level routes.
    # ------------------------------------------------------------------
    location ~ ^/(health|findings|projects|artifacts|github|webhook|api|stats|config)(/|$) {
        proxy_pass         http://mcp_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # FastAPI Swagger UI + OpenAPI spec — convenient for operator/dev.
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass         http://mcp_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # Static SPA — serve build, fall back to index.html for client routes.
    # ------------------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed Vite assets; HTML stays revalidated.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
