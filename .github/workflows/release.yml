name: Release — Build and push Docker images

# Builds the mcp + dashboard images on every git tag (vX.Y.Z) and pushes
# them to Docker Hub. Other projects pull these via docker-compose.example.yml.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Override tag (defaults to git tag / sha)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: mcp
            context: ./mcp
            image: cochecheee/sast-chat-mcp
          - service: dashboard
            context: ./dashboard
            image: cochecheee/sast-chat-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Tag :latest plus :v1.2.3 (when triggered by tag) or :sha-XXXX
      # (when triggered manually without an override).
      - name: Compute tags
        id: tags
        run: |
          set -e
          IMAGE="${{ matrix.image }}"
          DEFAULT_REF="${GITHUB_REF#refs/tags/}"
          OVERRIDE="${{ inputs.tag }}"
          VERSION_TAG="${OVERRIDE:-$DEFAULT_REF}"
          if [ -z "$VERSION_TAG" ] || [ "$VERSION_TAG" = "$GITHUB_REF" ]; then
            VERSION_TAG="sha-${GITHUB_SHA::7}"
          fi
          {
            echo "tags=${IMAGE}:latest,${IMAGE}:${VERSION_TAG}"
            echo "version=${VERSION_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          provenance: false

      - name: Summary
        run: |
          echo "::notice::Pushed ${{ matrix.image }}:latest and :${{ steps.tags.outputs.version }}"
