# Render Blueprint — chat-system MCP backend
# https://render.com/docs/blueprint-spec
#
# Connect: dashboard.render.com → New + → Blueprint → cochecheee/ChatSystem
# Render auto-reads this file, creates the Web Service + Persistent Disk,
# and asks you to fill in the 4 `sync: false` secrets in the UI.
#
# Auto-deploy: every push to `branch:` re-runs `docker build` and rolls
# out a new container. SQLite at /data survives across redeploys via
# the persistent disk mount.

services:
  - type: web
    name: mcp
    runtime: docker
    plan: free            # 750h/mo, sleeps after 15min idle, cold start ~30s
    region: singapore     # closest to VN; change to oregon/frankfurt as needed
    branch: ft/imp-fe     # auto-deploy on push here; switch to `main` later
    autoDeploy: true
    dockerfilePath: ./mcp/Dockerfile
    dockerContext: ./mcp
    healthCheckPath: /health

    # NOTE: Render free tier does NOT support persistent disks. SQLite at
    # /tmp/mcp.db resets on every redeploy + container restart. That's
    # acceptable for demo because webhook ingests fresh CI data; for
    # persistence upgrade to Render Postgres (free 90 days) and switch
    # DATABASE_URL to postgresql+asyncpg://...

    envVars:
      # ----- Public config (safe to commit) -----
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/mcp.db
      - key: GITHUB_OWNER
        value: cochecheee
      - key: GITHUB_REPO
        value: sample-python
      - key: POLLING_WORKFLOW_NAME
        value: Security
      - key: POLLING_INTERVAL_SECONDS
        value: "300"
      - key: POLLING_BRANCH
        value: main
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_MAX_RETRIES
        value: "3"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: CI_API_KEY
        value: ""
      # V2.4 — Monitor uptime checks (no email until SMTP_* set)
      - key: MONITOR_ENABLED
        value: "true"
      - key: MONITOR_INTERVAL_SECONDS
        value: "300"
      - key: MONITOR_TARGETS
        value: "1:https://sample-python-latest.onrender.com/health"
      - key: MONITOR_DOWN_THRESHOLD
        value: "2"
      - key: CORS_ORIGINS
        # Comma-separated list of allowed origins for the dashboard.
        # Static Site URL appended once V2.5 lands.
        value: "http://localhost:5173,http://localhost:4173,https://dashboard-chat-system.onrender.com"

      # ----- Secrets (set in Render UI after Blueprint creates the service) -----
      # `sync: false` tells Render: "don't manage this value — operator fills it in".
      - key: GITHUB_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CI_WEBHOOK_TOKEN
        sync: false

  # ============================================================
  # V2.5 — Dashboard Static Site
  # Render builds the Vite/React app and serves the static bundle
  # over a CDN — no cold start, unlimited 100GB/mo bandwidth free.
  # ============================================================
  - type: web
    name: dashboard
    runtime: static
    branch: ft/imp-fe
    autoDeploy: true
    rootDir: dashboard
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # SPA fallback — any unknown path serves index.html so React Router
    # client-side routing works on hard refresh / direct URL hits.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Security headers (default Render headers + tightened)
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    envVars:
      - key: VITE_API_URL
        value: https://mcp-l958.onrender.com
